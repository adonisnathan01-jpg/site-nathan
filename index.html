    <!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>HACKED</title>
    <style>
        body { background-color: black; margin: 0; overflow: hidden; }

        @keyframes clignoter { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
        
        @keyframes trembler {
            0% { transform: translate(0, 0); }
            20% { transform: translate(-5px, 5px); }
            40% { transform: translate(-5px, -5px); }
            60% { transform: translate(5px, 5px); }
            80% { transform: translate(5px, -5px); }
            100% { transform: translate(0, 0); }
        }

        h1 {
            position: absolute; width: 100%; top: 20%;
            font-size: 50px; color: red; text-align: center;
            font-family: 'Courier New', sans-serif;
            animation: clignoter 0.5s infinite;
            z-index: 10;
        }

        img {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            object-fit: cover;
            animation: trembler 0.1s infinite;
        }
    </style>
</head>
<body>

    <h1>KOHZA THE HACKERMAN</h1>
    
    <img src=IMG-20260622-WA0076.jpg alt="Hack">

    <script>
        // Cette fonction fait vibrer le téléphone en continu toutes les secondes
        function faireVibrer() {
            if (navigator.vibrate) {
                // Fait vibrer pendant 500ms (demi-seconde)
                navigator.vibrate(500);
            }
        }

        // Active la vibration dès que l'utilisateur touche l'écran
        window.addEventListener('click', () => {
            setInterval(faireVibrer, 1000);
        });
        
        window.addEventListener('touchstart', () => {
            setInterval(faireVibrer, 1000);
        });
    </script>

</body>
</html>
